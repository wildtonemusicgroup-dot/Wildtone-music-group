<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wildtone Operations Suite</title>
    <meta name="description"
        content="Plataforma de operaciones internas para Wildtone Music Group — gestión de tareas, CRM, finanzas, horario y agente AI." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon"><svg viewBox="0 0 40 40" width="24" height="24" fill="none" stroke="white"
                    stroke-width="2.8" stroke-linecap="round">
                    <line x1="8" y1="32" x2="16" y2="4" />
                    <line x1="14" y1="32" x2="22" y2="4" />
                    <line x1="20" y1="32" x2="28" y2="4" />
                    <line x1="12" y1="36" x2="20" y2="18" />
                    <line x1="18" y1="36" x2="26" y2="18" />
                </svg></div>
            <div class="logo-text">
                <span class="logo-title">Wildtone</span>
                <span class="logo-sub">Operations Suite</span>
            </div>
        </div>

        <nav class="sidebar-nav" id="sidebarNav">
            <!-- Generated dynamically by initApp() based on user role -->
        </nav>

        <div class="sidebar-bottom">
            <a class="nav-item" data-module="settings" id="nav-settings" style="display:none">
                <span class="nav-icon">⚙</span>
                <span class="nav-label">Configuración</span>
            </a>
            <div class="sidebar-user">
                <div class="user-avatar" id="userAvatar">MJ</div>
                <div class="user-info">
                    <span class="user-name" id="userName">—</span>
                    <span class="user-role" id="userRole">—</span>
                </div>

                <button class="user-logout-btn" onclick="doLogout()" title="Cerrar sesión">⏻</button>
            </div>
        </div>
    </aside>

    <!-- Main content -->
    <div class="main-wrapper">
        <!-- Topbar -->
        <header class="topbar">
            <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">☰</button>
            <div class="topbar-breadcrumb" id="breadcrumb">Dashboard</div>
            <div class="topbar-actions">
                <button class="btn-icon" id="quickAddBtn" title="Acción rápida">+</button>
                <button class="btn-icon notif-btn" id="notifBtn" title="Notificaciones">
                    🔔
                    <span class="notif-dot"></span>
                </button>
                <div class="topbar-avatar" id="topbarAvatar">MJ</div>
            </div>
        </header>

        <!-- Module views -->
        <main class="main-content" id="mainContent">
            <!-- Dashboard -->
            <section class="module-view active" id="module-dashboard"></section>
            <!-- Projects (includes tasks) -->
            <section class="module-view" id="module-projects"></section>
            <!-- CRM -->
            <section class="module-view" id="module-crm"></section>
            <section class="module-view" id="module-demos"></section>
            <!-- Finance -->
            <section class="module-view" id="module-finance"></section>
            <section class="module-view" id="module-royalties"></section>
            <!-- Time -->
            <section class="module-view" id="module-time"></section>
            <!-- Reports -->
            <section class="module-view" id="module-reports"></section>
            <!-- Support -->
            <section class="module-view" id="module-support"></section>
            <section class="module-view" id="module-launches"></section>
            <!-- Agent -->
            <section class="module-view" id="module-agent"></section>
            <!-- Documents -->
            <section class="module-view" id="module-docs"></section>
            <!-- Settings -->
            <section class="module-view" id="module-settings"></section>
            <!-- Chat -->
            <section class="module-view" id="module-chat"></section>
        </main>
    </div>

    <!-- Quick Add Modal -->
    <div class="modal-overlay" id="quickAddModal">
        <div class="modal glass-card">
            <div class="modal-header">
                <h3>Acción rápida</h3>
                <button class="modal-close" id="closeQuickAdd">✕</button>
            </div>
            <div class="quick-actions-grid">
                <button class="quick-action-btn" data-action="task">
                    <span class="qa-icon">✓</span>
                    <span>Nueva tarea</span>
                </button>
                <button class="quick-action-btn" data-action="expense">
                    <span class="qa-icon">$</span>
                    <span>Registrar gasto</span>
                </button>
                <button class="quick-action-btn" data-action="checkin">
                    <span class="qa-icon">◷</span>
                    <span>Check-in</span>
                </button>
                <button class="quick-action-btn" data-action="deal">
                    <span class="qa-icon">◉</span>
                    <span>Nuevo deal</span>
                </button>
                <button class="quick-action-btn" data-action="agent">
                    <span class="qa-icon">✦</span>
                    <span>Abrir Agente</span>
                </button>
                <button class="quick-action-btn" data-action="report">
                    <span class="qa-icon">▤</span>
                    <span>Ver reporte</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Notification Panel -->
    <div class="notif-panel glass-card" id="notifPanel">
        <div class="notif-panel-header">
            <h4>Notificaciones</h4>
            <button class="link-btn" onclick="markAllRead()">Marcar todo leído</button>
        </div>
        <div class="notif-list" id="notifList"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase.js"></script>
    <script src="app.js"></script>
    <script>
        // Mobile sidebar — global close function
        window.closeMobileSidebar = function () {
            var sidebar = document.getElementById('sidebar');
            var overlay = document.getElementById('sidebarOverlay');
            if (sidebar) sidebar.style.transform = 'translateX(-100%)';
            if (overlay) overlay.style.display = 'none';
            document.body.style.overflow = '';
        };

        (function () {
            var sidebar = document.getElementById('sidebar');
            var overlay = document.getElementById('sidebarOverlay');
            var toggle = document.getElementById('sidebarToggle');

            if (toggle) {
                toggle.addEventListener('click', function (e) {
                    e.stopPropagation();
                    var isOpen = overlay && overlay.style.display === 'block';
                    if (isOpen) {
                        window.closeMobileSidebar();
                    } else {
                        if (sidebar) sidebar.style.transform = 'translateX(0)';
                        if (overlay) overlay.style.display = 'block';
                        document.body.style.overflow = 'hidden';
                    }
                });
            }

            if (overlay) {
                overlay.addEventListener('click', function () {
                    window.closeMobileSidebar();
                });
            }

            // Close sidebar on any nav click (mobile)
            if (sidebar) {
                sidebar.addEventListener('click', function (e) {
                    var navItem = e.target.closest('.nav-item, [data-module]');
                    if (navItem && window.innerWidth <= 768) {
                        setTimeout(window.closeMobileSidebar, 100);
                    }
                });
            }

            // On resize to desktop, reset styles
            window.addEventListener('resize', function () {
                if (window.innerWidth > 768) {
                    var isMobileMenuOpen = overlay && overlay.style.display === 'block';
                    if (isMobileMenuOpen) window.closeMobileSidebar();
                    if (sidebar) sidebar.style.transform = ''; // Clear inline transform so CSS takes over
                }
            });
        })();
    </script>
</body>

</html>
